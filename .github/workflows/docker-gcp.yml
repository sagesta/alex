# Build researcher image → Artifact Registry → Cloud Run.
# Build Next static export → GCS bucket (terraform output frontend_bucket_name → GitHub Variable GCS_FRONTEND_BUCKET).
#
# Prereqs: terraform apply in terraform/gcp; GitHub secrets/vars (see terraform.tfvars.example).
# Clerk: set repository secret NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY (and any other NEXT_PUBLIC_* your app needs).
# Portfolio API: set GitHub Variable NEXT_PUBLIC_API_URL to the Cloud Run URL of **backend/api** (deploy separately with
# `docker build -f backend/api/Dockerfile .` + gcloud run deploy). Do not use the researcher URL — it has no /api/user.
# Re-run without a code change: GitHub → Actions → Docker GCP → Run workflow (workflow_dispatch).

name: Docker GCP

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/researcher/**"
      - "backend/api/**"
      - "backend/database/**"
      - "frontend/**"
      - ".github/workflows/docker-gcp.yml"

permissions:
  contents: read

jobs:
  build-push:
    runs-on: ubuntu-latest
    env:
      ARTIFACT_REGISTRY_URL: ${{ vars.ARTIFACT_REGISTRY_URL || vars.GCP_ARTIFACT_REGISTRY || secrets.ARTIFACT_REGISTRY_URL || secrets.GCP_ARTIFACT_REGISTRY }}
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: researcher
            context: backend/researcher
          - service: api
            context: backend/api
          - service: frontend
            context: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Artifact Registry URL
        run: |
          test -n "$ARTIFACT_REGISTRY_URL" || { echo "::error::Set ARTIFACT_REGISTRY_URL (terraform output artifact_registry_url)"; exit 1; }

      - name: Image tag
        id: tag
        run: echo "tag=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_CREDENTIALS || secrets.GCP_CREDENTIALS || secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          REG_HOST=$(echo "$ARTIFACT_REGISTRY_URL" | cut -d/ -f1)
          gcloud auth configure-docker "$REG_HOST" --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        working-directory: ${{ github.workspace }}
        env:
          IMAGE_BASE: ${{ env.ARTIFACT_REGISTRY_URL }}/${{ matrix.service }}
        run: |
          docker build --platform linux/amd64 \
            -f "${{ matrix.context }}/Dockerfile" \
            -t "${IMAGE_BASE}:${{ steps.tag.outputs.tag }}" \
            -t "${IMAGE_BASE}:latest" \
            .
          docker push "${IMAGE_BASE}:${{ steps.tag.outputs.tag }}"
          docker push "${IMAGE_BASE}:latest"

  deploy-researcher:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      ARTIFACT_REGISTRY_URL: ${{ vars.ARTIFACT_REGISTRY_URL || vars.GCP_ARTIFACT_REGISTRY || secrets.ARTIFACT_REGISTRY_URL || secrets.GCP_ARTIFACT_REGISTRY }}
      GCP_REGION: ${{ vars.TF_VAR_region || vars.TF_VAR_REGION || vars.GCP_REGION || secrets.TF_VAR_region || secrets.TF_VAR_REGION || secrets.GCP_REGION }}
      GCP_PROJECT: ${{ vars.TF_VAR_project_id || vars.GCP_PROJECT_ID || secrets.TF_VAR_project_id || secrets.GCP_PROJECT_ID }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_RESEARCHER_SERVICE || 'alex-researcher' }}
    outputs:
      service_url: ${{ steps.deploy.outputs.service_url }}
    steps:
      - name: Check GCP config
        run: |
          test -n "$GCP_REGION" && test -n "$GCP_PROJECT" || { echo "::error::Set TF_VAR_region and TF_VAR_project_id (or GCP_REGION / GCP_PROJECT_ID)"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_CREDENTIALS || secrets.GCP_CREDENTIALS || secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        env:
          IMAGE: ${{ env.ARTIFACT_REGISTRY_URL }}/researcher:${{ needs.build-push.outputs.image_tag }}
        run: |
          gcloud run deploy "$CLOUD_RUN_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 1Gi \
            --cpu 1 \
            --timeout 300 \
            --quiet
          URL=$(gcloud run services describe "$CLOUD_RUN_SERVICE" --region "$GCP_REGION" --project "$GCP_PROJECT" --format 'value(status.url)')
          echo "service_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Cloud Run URL: $URL"

  # Portfolio FastAPI (backend/api) — serves /api/user, /api/accounts, … Not the researcher service.
  deploy-api:
    needs: build-push
    runs-on: ubuntu-latest
    env:
      ARTIFACT_REGISTRY_URL: ${{ vars.ARTIFACT_REGISTRY_URL || vars.GCP_ARTIFACT_REGISTRY || secrets.ARTIFACT_REGISTRY_URL || secrets.GCP_ARTIFACT_REGISTRY }}
      GCP_REGION: ${{ vars.TF_VAR_region || vars.TF_VAR_REGION || vars.GCP_REGION || secrets.TF_VAR_region || secrets.TF_VAR_REGION || secrets.GCP_REGION }}
      GCP_PROJECT: ${{ vars.TF_VAR_project_id || vars.GCP_PROJECT_ID || secrets.TF_VAR_project_id || secrets.GCP_PROJECT_ID }}
      CLOUD_RUN_API_SERVICE: ${{ vars.CLOUD_RUN_API_SERVICE || 'alex-api' }}
    outputs:
      service_url: ${{ steps.deploy.outputs.service_url }}
    steps:
      - name: Check GCP config
        run: |
          test -n "$GCP_REGION" && test -n "$GCP_PROJECT" || { echo "::error::Set TF_VAR_region and TF_VAR_project_id (or GCP_REGION / GCP_PROJECT_ID)"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_CREDENTIALS || secrets.GCP_CREDENTIALS || secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy API to Cloud Run
        id: deploy
        env:
          IMAGE: ${{ env.ARTIFACT_REGISTRY_URL }}/api:${{ needs.build-push.outputs.image_tag }}
          CLERK_JWKS_URL: ${{ secrets.CLERK_JWKS_URL }}
          DATABASE_URL: ${{ secrets.API_DATABASE_URL || secrets.DATABASE_URL }}
          CLOUD_SQL_CONNECTION_NAME: ${{ vars.CLOUD_SQL_CONNECTION_NAME || vars.cloud_sql_connection_name }}
        run: |
          test -n "$CLERK_JWKS_URL" || { echo "::error::Add repository secret CLERK_JWKS_URL (Clerk Dashboard → API Keys → JWT template / JWKS URL)"; exit 1; }
          test -n "$DATABASE_URL" || { echo "::error::Add secret API_DATABASE_URL or DATABASE_URL with postgresql://… for Cloud SQL (same URI as terraform Secret Manager alex-database-url if you copy it)"; exit 1; }
          python3 << 'PY'
          import json, os
          from pathlib import Path
          p = Path("/tmp/alex-api-cloudrun-env.yaml")
          lines = [
              "CLERK_JWKS_URL: " + json.dumps(os.environ["CLERK_JWKS_URL"]),
              "DATABASE_URL: " + json.dumps(os.environ["DATABASE_URL"]),
          ]
          p.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          EXTRA=()
          if [ -n "$CLOUD_SQL_CONNECTION_NAME" ]; then
            EXTRA+=(--add-cloudsql-instances="$CLOUD_SQL_CONNECTION_NAME")
          fi
          gcloud run deploy "$CLOUD_RUN_API_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 120 \
            --env-vars-file /tmp/alex-api-cloudrun-env.yaml \
            "${EXTRA[@]}" \
            --quiet
          URL=$(gcloud run services describe "$CLOUD_RUN_API_SERVICE" --region "$GCP_REGION" --project "$GCP_PROJECT" --format 'value(status.url)')
          echo "service_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Portfolio API URL: $URL"

  # Frontend Next.js server on Cloud Run — replaces GCS static hosting.
  # NEXT_PUBLIC_* are set as Cloud Run runtime env vars at deploy (not baked into image).
  deploy-frontend:
    needs: [build-push, deploy-api]
    runs-on: ubuntu-latest
    env:
      ARTIFACT_REGISTRY_URL: ${{ vars.ARTIFACT_REGISTRY_URL || vars.GCP_ARTIFACT_REGISTRY || secrets.ARTIFACT_REGISTRY_URL || secrets.GCP_ARTIFACT_REGISTRY }}
      GCP_REGION: ${{ vars.TF_VAR_region || vars.TF_VAR_REGION || vars.GCP_REGION || secrets.TF_VAR_region || secrets.TF_VAR_REGION || secrets.GCP_REGION }}
      GCP_PROJECT: ${{ vars.TF_VAR_project_id || vars.GCP_PROJECT_ID || secrets.TF_VAR_project_id || secrets.GCP_PROJECT_ID }}
      CLOUD_RUN_FRONTEND_SERVICE: ${{ vars.CLOUD_RUN_FRONTEND_SERVICE || 'alex-frontend' }}
    outputs:
      service_url: ${{ steps.deploy.outputs.service_url }}
    steps:
      - name: Check GCP config
        run: |
          test -n "$GCP_REGION" && test -n "$GCP_PROJECT" || { echo "::error::Set TF_VAR_region and TF_VAR_project_id (or GCP_REGION / GCP_PROJECT_ID)"; exit 1; }
          test -n "$ARTIFACT_REGISTRY_URL" || { echo "::error::Set ARTIFACT_REGISTRY_URL"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY || secrets.GOOGLE_CREDENTIALS || secrets.GCP_CREDENTIALS || secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Frontend to Cloud Run
        id: deploy
        env:
          IMAGE: ${{ env.ARTIFACT_REGISTRY_URL }}/frontend:${{ needs.build-push.outputs.image_tag }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || secrets.NEXT_PUBLIC_API_URL || needs.deploy-api.outputs.service_url }}
        run: |
          # Resolve API URL: explicit variable wins; fall back to freshly deployed api service URL
          RESOLVED_API_URL="${NEXT_PUBLIC_API_URL}"
          if [ -z "$RESOLVED_API_URL" ] || [ "$RESOLVED_API_URL" = "null" ]; then
            echo "::warning::NEXT_PUBLIC_API_URL not set; frontend will use same-origin /api/* (works with a load balancer, not direct Cloud Run)."
          fi

          python3 << 'PY'
import json, os
from pathlib import Path
p = Path("/tmp/alex-frontend-env.yaml")
env = {
    "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY": os.environ.get("NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY", ""),
}
api_url = os.environ.get("NEXT_PUBLIC_API_URL", "").strip()
if api_url and api_url != "null":
    env["NEXT_PUBLIC_API_URL"] = api_url
lines = [f"{k}: {json.dumps(v)}" for k, v in env.items() if v]
p.write_text("\n".join(lines) + "\n", encoding="utf-8")
PY
          gcloud run deploy "$CLOUD_RUN_FRONTEND_SERVICE" \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 60 \
            --env-vars-file /tmp/alex-frontend-env.yaml \
            --quiet
          URL=$(gcloud run services describe "$CLOUD_RUN_FRONTEND_SERVICE" --region "$GCP_REGION" --project "$GCP_PROJECT" --format 'value(status.url)')
          echo "service_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Frontend URL: $URL"

  demo-urls:
    needs: [build-push, deploy-researcher, deploy-api, deploy-frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Presentation summary
        env:
          RESEARCHER_URL: ${{ needs.deploy-researcher.outputs.service_url }}
          API_URL: ${{ needs.deploy-api.outputs.service_url }}
          FRONTEND_URL: ${{ needs.deploy-frontend.outputs.service_url }}
          RESEARCHER_RESULT: ${{ needs.deploy-researcher.result }}
          API_RESULT: ${{ needs.deploy-api.result }}
          FRONTEND_RESULT: ${{ needs.deploy-frontend.result }}
        run: |
          {
            echo "## Demo URLs"
            echo ""
            echo "| Service | URL |"
            echo "| --- | --- |"
            if [ "$FRONTEND_RESULT" = "success" ] && [ -n "$FRONTEND_URL" ]; then
              echo "| **Frontend (Cloud Run)** | $FRONTEND_URL |"
            else
              echo "| **Frontend (Cloud Run)** | *(deploy-frontend failed — check job logs)* |"
            fi
            if [ "$API_RESULT" = "success" ] && [ -n "$API_URL" ]; then
              echo "| **Portfolio API (Cloud Run)** | $API_URL |"
            else
              echo "| **Portfolio API (Cloud Run)** | *(deploy-api failed — needs secrets CLERK_JWKS_URL + DATABASE_URL)* |"
            fi
            if [ "$RESEARCHER_RESULT" = "success" ] && [ -n "$RESEARCHER_URL" ]; then
              echo "| **Researcher (Cloud Run)** | $RESEARCHER_URL |"
            else
              echo "| **Researcher (Cloud Run)** | *(deploy failed — check job logs)* |"
            fi
            echo ""
            echo "**Backend wiring:** \`NEXT_PUBLIC_API_URL\` on the frontend Cloud Run service must point at \`alex-api\` (not researcher). Set as GitHub Variable/Secret or it auto-resolves from \`deploy-api\`."
          } >> "$GITHUB_STEP_SUMMARY"
